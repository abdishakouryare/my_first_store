{% extends 'store/base.html' %}
{% block content %}

{% if user.is_staff %}
<a class="btn" href="{% url 'add_product' %}">➕ Add Product</a>
{% endif %}

<br><br>

<div class="products">
    {% for product in products %}
    <div class="card">
        <img src="{{ product.image.url }}">
        <h3>{{ product.name }}</h3>
        <p class="price">${{ product.price }}</p>

        {% if user.is_authenticated %}
            <a class="btn" href="{% url 'buy' product.id %}">Buy</a>
        {% if user.is_staff %}
            <a class="btn" href="{% url 'update_product' product.id %}">Edit</a>
            <a class="btn btn-danger" href="{% url 'delete_product' product.id %}">Delete</a>
        {% endif %}
        {% endif %}
    </div>
    {% endfor %}
</div>

{% endblock %}
